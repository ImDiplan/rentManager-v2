name: Keep Supabase Project Active

on:
  schedule:
    # Runs every 4 days at 12:00 PM UTC
    - cron: '0 12 */4 * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Create and delete temporary property
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          payload="$(printf '{"name":"Keep Alive %s","address":"Automation %s","monthly_rent":1,"currency":"RD$","rooms":1,"status":"Disponible","payment_status":"Pendiente"}' "$timestamp" "$timestamp")"

          created_property="$(
            curl --silent --show-error --fail-with-body \
              -X POST "${SUPABASE_URL}/rest/v1/properties" \
              -H "Content-Type: application/json" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Prefer: return=representation" \
              -d "$payload"
          )"

          property_id="$(printf '%s' "$created_property" | jq -r '.[0].id')"

          if [[ -z "$property_id" || "$property_id" == "null" ]]; then
            echo "Failed to extract created property id"
            echo "$created_property"
            exit 1
          fi

          curl --silent --show-error --fail-with-body \
            -X DELETE "${SUPABASE_URL}/rest/v1/properties?id=eq.${property_id}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Prefer: return=minimal"

      - name: Log success
        run: echo "Supabase keep-alive create/delete cycle executed successfully"
